<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypto Market Live - PRO Version</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #0d1117;
      color: #d1d5da;
    }
    .card {
      background-color: #161b22;
      border: none;
      border-radius: 12px;
    }
    .price-up {
      color: #22c55e;
    }
    .price-down {
      color: #ef4444;
    }
    .table td, .table th {
      vertical-align: middle;
    }
    .more-link {
      color: #facc15;
      cursor: pointer;
    }
    .more-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body class="p-4">

  <div class="container">
    <h2 class="text-white mb-5">Trading Data (Live Binance API)</h2>

    <div class="row g-4">

      <!-- Hot Coins Section -->
      <div class="col-md-4">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Hot Coins</h5>
            <span class="more-link" onclick="location.href='#'">More</span>
          </div>
          <div class="table-responsive">
            <table class="table table-borderless text-white">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Price</th>
                  <th>24h Change</th>
                </tr>
              </thead>
              <tbody id="hot-coins-body">
                <tr><td colspan="4" class="text-center">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Top Gainers Section -->
      <div class="col-md-4">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Top Gainers</h5>
            <span class="more-link" onclick="location.href='#'">More</span>
          </div>
          <div class="table-responsive">
            <table class="table table-borderless text-white">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Price</th>
                  <th>24h Change</th>
                </tr>
              </thead>
              <tbody id="top-gainers-body">
                <tr><td colspan="4" class="text-center">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Top Losers Section -->
      <div class="col-md-4">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="mb-0">Top Losers</h5>
            <span class="more-link" onclick="location.href='#'">More</span>
          </div>
          <div class="table-responsive">
            <table class="table table-borderless text-white">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Name</th>
                  <th>Price</th>
                  <th>24h Change</th>
                </tr>
              </thead>
              <tbody id="top-losers-body">
                <tr><td colspan="4" class="text-center">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div> <!-- row end -->

  </div> <!-- container end -->

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Crypto Fetching Script -->
  <script>
    const logoMap = {
      BTC: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png?v=032',
      ETH: 'https://cryptologos.cc/logos/ethereum-eth-logo.png?v=032',
      BNB: 'https://cryptologos.cc/logos/binance-coin-bnb-logo.png?v=032',
      DOGE: 'https://cryptologos.cc/logos/dogecoin-doge-logo.png?v=032',
      XRP: 'https://cryptologos.cc/logos/xrp-xrp-logo.png?v=032',
      SOL: 'https://cryptologos.cc/logos/solana-sol-logo.png?v=032',
      SUI: 'https://cryptologos.cc/logos/sui-sui-logo.png?v=032',
      PEPE: 'https://cryptologos.cc/logos/pepe-pepe-logo.png?v=032'
      // Add more if needed
    };
  
    async function loadCryptoData() {
      try {
        const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
        const allData = await response.json();
  
        const watchlistSymbols = ['BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'DOGEUSDT', 'XRPUSDT', 'SOLUSDT', 'SUIUSDT', 'PEPEUSDT'];
  
        const hotCoins = allData.filter(coin => watchlistSymbols.includes(coin.symbol));
  
        const topGainers = [...allData]
          .filter(c => parseFloat(c.priceChangePercent) > 0)
          .sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent))
          .slice(0, 10);
  
        const topLosers = [...allData]
          .filter(c => parseFloat(c.priceChangePercent) < 0)
          .sort((a, b) => parseFloat(a.priceChangePercent) - parseFloat(b.priceChangePercent))
          .slice(0, 10);
  
        updateTable('hot-coins-body', hotCoins);
        updateTable('top-gainers-body', topGainers);
        updateTable('top-losers-body', topLosers, true);
  
      } catch (error) {
        console.error('Error fetching crypto data:', error);
      }
    }
  
    function updateTable(tableId, data, isLoser = false) {
      const tbody = document.getElementById(tableId);
      tbody.innerHTML = '';
  
      data.forEach((coin, index) => {
        const price = parseFloat(coin.lastPrice).toFixed(4);
        const change = parseFloat(coin.priceChangePercent).toFixed(2);
        const name = coin.symbol.replace('USDT', '');
        const logoUrl = logoMap[name] || 'https://via.placeholder.com/20'; // fallback logo if not found
  
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${index + 1}</td>
          <td><img src="${logoUrl}" style="width:20px;height:20px;margin-right:5px;">${name}</td>
          <td>$${price}</td>
          <td class="${isLoser || change < 0 ? 'price-down' : 'price-up'}">${change}%</td>
        `;
        tbody.appendChild(row);
      });
    }
  
    // Initial load
    loadCryptoData();
    // Refresh every 10 seconds
    setInterval(loadCryptoData, 10000);
  </script>
  
</body>
</html>
