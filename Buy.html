<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC - Cryptex</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/cryptex-master/assets/css/style.css">
  <style>
    .box-transparent {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(6px);
      border-radius: 10px;
      color: #fff;
    }
    .input-transparent {
      background-color: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .input-transparent::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    /* Order Book Styling */
    .order-box {
      background-color: #1e2329;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }
    .order-header {
      background-color: #2b3139;
      padding: 10px 15px;
      font-weight: 600;
      font-size: 1.1rem;
      color: #f0b90b;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      text-align: right;
      padding: 8px 12px;
      border-bottom: 1px solid #2b3139;
    }
    th {
      background-color: #1e2329;
      color: #848e9c;
      font-weight: 500;
    }
    tr:hover {
      background-color: #2b3139;
    }
    .buy {
      color: #0ecb81;
    }
    .sell {
      color: #f6465d;
    }
  </style>
</head>
<body style="margin: 0; padding-top: 80px; font-family: Arial, sans-serif; background-color: #121212; color: white;">

  <!-- HEADER -->
  <header class="header" data-header>...</header>

  <!-- Live BTC Price and Change -->
  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center p-3 border rounded bg-dark text-white" style="background-color: #1e1e1e;">
      <div>
        <img src="/cryptex-master/assets/images/BTC.png" class="token-icon" style="width: 32px; height: 32px; margin-right: 10px;" onclick="location.href='/BTC.html'"> BTC
      </div>
      <div id="btc-price" style="font-size: 1.25rem;">$0.00</div>
      <div id="btc-change" style="font-size: 1.25rem;" class="price-up">0.00%</div>
    </div>
  </div>

  <!-- Main Content: Orderbook and Chart -->
  <div class="container">
    <div class="row">
      <!-- Buy Orders -->
      <div class="col-lg-3">
        <div class="order-box">
          <div class="order-header">Buy Orders</div>
          <table>
            <thead>
              <tr><th>Price (USDT)</th><th>Amount (BTC)</th></tr>
            </thead>
            <tbody id="buyOrders"></tbody>
          </table>
        </div>
      </div>

      <!-- Chart -->
      <div class="col-lg-6 mb-4">
        <div class="tradingview-widget-container">
          <div id="tradingview_bitcoin"></div>
        </div>
        <div class="tradingview-widget-copyright">
          <a href="https://www.tradingview.com/symbols/BTCUSDT/" rel="noopener" target="_blank">
            <span class="blue-text">BTCUSDT Chart</span>
          </a>
        </div>
      </div>

      <!-- Sell Orders -->
      <div class="col-lg-3">
        <div class="order-box">
          <div class="order-header">Sell Orders</div>
          <table>
            <thead>
              <tr><th>Price (USDT)</th><th>Amount (BTC)</th></tr>
            </thead>
            <tbody id="sellOrders"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Buy/Sell Form -->
  <div class="container">
    <div class="box-transparent border p-4 mb-4">
      <div class="row">
        <div class="col-md-6">
          <h4>Buy BTC</h4>
          <form>
            <div class="mb-3">
              <label class="form-label">USDT Amount</label>
              <input type="number" class="form-control input-transparent" placeholder="Enter USDT">
            </div>
            <button type="submit" class="btn btn-success">Buy</button>
          </form>
        </div>
        <div class="col-md-6">
          <h4>Sell BTC</h4>
          <form>
            <div class="mb-3">
              <label class="form-label">BTC Amount</label>
              <input type="number" class="form-control input-transparent" placeholder="Enter BTC">
            </div>
            <button type="submit" class="btn btn-danger">Sell</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://s3.tradingview.com/tv.js"></script>
  <script>
    new TradingView.widget({
      "width": "100%",
      "height": 600,
      "symbol": "BINANCE:BTCUSDT",
      "interval": "D",
      "timezone": "Etc/UTC",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "toolbar_bg": "#f1f3f6",
      "enable_publishing": false,
      "withdateranges": true,
      "hide_side_toolbar": false,
      "allow_symbol_change": true,
      "studies": [],
      "container_id": "tradingview_bitcoin"
    });
  </script>

  <script>
    const socketPrice = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
    socketPrice.onmessage = function (event) {
      const data = JSON.parse(event.data);
      const price = parseFloat(data.c);
      const change = parseFloat(data.P);

      const displayPrice = price > 1000 ? `$${(price / 1000).toFixed(2)}K` : `$${price.toFixed(2)}`;
      document.getElementById('btc-price').innerText = displayPrice;

      const changeEl = document.getElementById('btc-change');
      changeEl.innerText = `${change.toFixed(2)}%`;

      if (change >= 0) {
        changeEl.classList.add('price-up');
        changeEl.classList.remove('price-down');
        changeEl.style.color = 'limegreen';
      } else {
        changeEl.classList.add('price-down');
        changeEl.classList.remove('price-up');
        changeEl.style.color = 'red';
      }
    };

    const buyTable = document.getElementById('buyOrders');
    const sellTable = document.getElementById('sellOrders');
    const socketDepth = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@depth20@100ms');

    socketDepth.onmessage = function(event) {
      const data = JSON.parse(event.data);
      updateTable(buyTable, data.bids, 'buy');
      updateTable(sellTable, data.asks, 'sell');
    };

    function updateTable(table, data, type) {
      table.innerHTML = '';
      data.slice(0, 20).forEach(order => {
        const price = parseFloat(order[0]).toLocaleString();
        const amount = parseFloat(order[1]).toFixed(6);
        const row = document.createElement('tr');
        row.innerHTML = `<td class="${type}">${price}</td><td>${amount}</td>`;
        table.appendChild(row);
      });
    }
  </script>

</body>
</html>
