<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Unlocks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d1117;
      color: #d1d5da;
    }
    .card {
      background-color: #161b22;
      border: none;
      border-radius: 12px;
    }
    .token-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      margin-right: 5px;
    }
    .text-warning {
      color: #facc15;
    }
  </style>
</head>
<body class="p-4">
  <div class="container">
    <h2 class="text-white mb-4">Upcoming Token Unlocks</h2>
    <div class="card p-3">
      <div class="table-responsive">
        <table class="table table-borderless text-white">
          <thead>
            <tr>
              <th>#</th>
              <th>Token</th>
              <th>Unlock Date</th>
              <th>Amount</th>
              <th>Est. % Supply</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td><img src="https://cryptologos.cc/logos/aptos-apt-logo.png?v=032" class="token-icon">APT</td>
              <td>2025-05-01</td>
              <td>7,000,000</td>
              <td class="text-warning">2.3%</td>
            </tr>
            <tr>
              <td>2</td>
              <td><img src="https://cryptologos.cc/logos/arbitrum-arb-logo.png?v=032" class="token-icon">ARB</td>
              <td>2025-05-03</td>
              <td>13,500,000</td>
              <td class="text-warning">4.1%</td>
            </tr>
            <tr>
              <td>3</td>
              <td><img src="https://cryptologos.cc/logos/immutable-x-imx-logo.png?v=032" class="token-icon">IMX</td>
              <td>2025-05-06</td>
              <td>9,800,000</td>
              <td class="text-warning">5.6%</td>
            </tr>
            <tr>
              <td>4</td>
              <td><img src="https://cryptologos.cc/logos/blur-blur-logo.png?v=032" class="token-icon">BLUR</td>
              <td>2025-05-08</td>
              <td>12,000,000</td>
              <td class="text-warning">6.4%</td>
            </tr>
            <tr>
              <td>5</td>
              <td><img src="https://cryptologos.cc/logos/optimism-ethereum-op-logo.png?v=032" class="token-icon">OP</td>
              <td>2025-05-10</td>
              <td>10,000,000</td>
              <td class="text-warning">2.9%</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
